<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>
    <linearGradient id="b-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ef4444"/><stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="o-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="p1-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/><stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="p2-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="pa-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14b8a6"/><stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="s-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e"/><stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="1000" height="560" fill="url(#bg)"/>

  <!-- Title -->
  <text x="500" y="38" text-anchor="middle" font-size="24" font-weight="bold" fill="#1e293b">BOPPPS 六步教学模型</text>
  <text x="500" y="62" text-anchor="middle" font-size="14" fill="#64748b">BOPPPS Six-Step Teaching Model</text>

  <!-- Step 1: Bridge-in -->
  <g filter="url(#shadow)">
    <rect x="30" y="110" width="140" height="160" rx="14" fill="url(#b-grad)"/>
    <text x="100" y="140" text-anchor="middle" font-size="28" fill="#fff" font-weight="bold">B</text>
    <text x="100" y="168" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">Bridge-in</text>
    <text x="100" y="186" text-anchor="middle" font-size="12" fill="#fff">导入</text>
    <line x1="55" y1="198" x2="145" y2="198" stroke="#fff" stroke-opacity="0.4" stroke-width="1"/>
    <text x="100" y="216" text-anchor="middle" font-size="11" fill="#fff">临床案例导入</text>
    <text x="100" y="234" text-anchor="middle" font-size="11" fill="#fff">问题情境创设</text>
    <text x="100" y="252" text-anchor="middle" font-size="11" fill="#fff">数据冲击法</text>
    <text x="100" y="270" text-anchor="middle" font-size="10" fill="#fff" opacity="0.8">≈ 4-5 min</text>
  </g>

  <!-- Arrow 1 -->
  <path d="M 175 190 L 205 190" stroke="#cbd5e1" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <polygon points="205,185 215,190 205,195" fill="#cbd5e1"/>

  <!-- Step 2: Objective -->
  <g filter="url(#shadow)">
    <rect x="222" y="110" width="140" height="160" rx="14" fill="url(#o-grad)"/>
    <text x="292" y="140" text-anchor="middle" font-size="28" fill="#fff" font-weight="bold">O</text>
    <text x="292" y="168" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">Objective</text>
    <text x="292" y="186" text-anchor="middle" font-size="12" fill="#fff">目标</text>
    <line x1="247" y1="198" x2="337" y2="198" stroke="#fff" stroke-opacity="0.4" stroke-width="1"/>
    <text x="292" y="216" text-anchor="middle" font-size="11" fill="#fff">知识/技能/态度</text>
    <text x="292" y="234" text-anchor="middle" font-size="11" fill="#fff">三维目标设计</text>
    <text x="292" y="252" text-anchor="middle" font-size="11" fill="#fff">Bloom动词规范</text>
    <text x="292" y="270" text-anchor="middle" font-size="10" fill="#fff" opacity="0.8">≈ 2-3 min</text>
  </g>

  <!-- Arrow 2 -->
  <polygon points="407,185 417,190 407,195" fill="#cbd5e1"/>

  <!-- Step 3: Pre-assessment -->
  <g filter="url(#shadow)">
    <rect x="414" y="110" width="140" height="160" rx="14" fill="url(#p1-grad)"/>
    <text x="484" y="140" text-anchor="middle" font-size="28" fill="#fff" font-weight="bold">P</text>
    <text x="484" y="168" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">Pre-assess</text>
    <text x="484" y="186" text-anchor="middle" font-size="12" fill="#fff">前测</text>
    <line x1="439" y1="198" x2="529" y2="198" stroke="#fff" stroke-opacity="0.4" stroke-width="1"/>
    <text x="484" y="216" text-anchor="middle" font-size="11" fill="#fff">诊断已有知识</text>
    <text x="484" y="234" text-anchor="middle" font-size="11" fill="#fff">快速投票/测验</text>
    <text x="484" y="252" text-anchor="middle" font-size="11" fill="#fff">调整教学节奏</text>
    <text x="484" y="270" text-anchor="middle" font-size="10" fill="#fff" opacity="0.8">≈ 3-5 min</text>
  </g>

  <!-- Arrow 3 -->
  <polygon points="599,185 609,190 599,195" fill="#cbd5e1"/>

  <!-- Step 4: Participatory Learning -->
  <g filter="url(#shadow)">
    <rect x="606" y="100" width="160" height="180" rx="14" fill="url(#p2-grad)"/>
    <text x="686" y="132" text-anchor="middle" font-size="28" fill="#fff" font-weight="bold">P</text>
    <text x="686" y="160" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">Participatory</text>
    <text x="686" y="178" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">Learning</text>
    <text x="686" y="196" text-anchor="middle" font-size="12" fill="#fff">参与式学习</text>
    <line x1="631" y1="208" x2="741" y2="208" stroke="#fff" stroke-opacity="0.4" stroke-width="1"/>
    <text x="686" y="226" text-anchor="middle" font-size="11" fill="#fff">PBL/CBL/TBL整合</text>
    <text x="686" y="244" text-anchor="middle" font-size="11" fill="#fff">模拟教学/角色扮演</text>
    <text x="686" y="262" text-anchor="middle" font-size="11" fill="#fff">学生活动占比&gt;50%</text>
    <text x="686" y="278" text-anchor="middle" font-size="10" fill="#fff" opacity="0.8">≈ 23-25 min</text>
  </g>

  <!-- Arrow 4 -->
  <polygon points="781,185 791,190 781,195" fill="#cbd5e1"/>

  <!-- Step 5: Post-assessment -->
  <g filter="url(#shadow)">
    <rect x="788" y="110" width="140" height="160" rx="14" fill="url(#pa-grad)"/>
    <text x="858" y="140" text-anchor="middle" font-size="28" fill="#fff" font-weight="bold">P</text>
    <text x="858" y="168" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">Post-assess</text>
    <text x="858" y="186" text-anchor="middle" font-size="12" fill="#fff">后测</text>
    <line x1="813" y1="198" x2="903" y2="198" stroke="#fff" stroke-opacity="0.4" stroke-width="1"/>
    <text x="858" y="216" text-anchor="middle" font-size="11" fill="#fff">检测目标达成</text>
    <text x="858" y="234" text-anchor="middle" font-size="11" fill="#fff">对接OSCE/mini-CEX</text>
    <text x="858" y="252" text-anchor="middle" font-size="11" fill="#fff">变式病例评估</text>
    <text x="858" y="270" text-anchor="middle" font-size="10" fill="#fff" opacity="0.8">≈ 5-7 min</text>
  </g>

  <!-- Curved arrow back to start (feedback loop) -->
  <path d="M 858 280 Q 858 340 686 340 Q 400 340 100 340 Q 100 340 100 280" stroke="#94a3b8" stroke-width="2" fill="none" stroke-dasharray="6 4" marker-end="url(#arrow2)"/>
  <polygon points="95,275 100,285 105,275" fill="#94a3b8"/>
  <text x="480" y="358" text-anchor="middle" font-size="11" fill="#94a3b8" font-style="italic">反馈循环 Feedback Loop — 后测结果指导下一轮教学改进</text>

  <!-- Bottom: Medical Education Features -->
  <rect x="30" y="390" width="940" height="140" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>
  <text x="500" y="418" text-anchor="middle" font-size="15" font-weight="bold" fill="#2563eb">医学院校特色融入 Medical Education Integration</text>

  <g transform="translate(50, 435)">
    <rect x="0" y="0" width="200" height="80" rx="8" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="100" y="22" text-anchor="middle" font-size="12" font-weight="bold" fill="#2563eb">临床案例驱动</text>
    <text x="100" y="42" text-anchor="middle" font-size="11" fill="#64748b">真实病例贯穿全课</text>
    <text x="100" y="60" text-anchor="middle" font-size="11" fill="#64748b">渐进信息释放</text>
  </g>

  <g transform="translate(270, 435)">
    <rect x="0" y="0" width="200" height="80" rx="8" fill="#f0fdf4" stroke="#bbf7d0"/>
    <text x="100" y="22" text-anchor="middle" font-size="12" font-weight="bold" fill="#16a34a">教学法整合</text>
    <text x="100" y="42" text-anchor="middle" font-size="11" fill="#64748b">PBL / CBL / TBL</text>
    <text x="100" y="60" text-anchor="middle" font-size="11" fill="#64748b">模拟教学 / 床旁教学</text>
  </g>

  <g transform="translate(490, 435)">
    <rect x="0" y="0" width="200" height="80" rx="8" fill="#fef3c7" stroke="#fde68a"/>
    <text x="100" y="22" text-anchor="middle" font-size="12" font-weight="bold" fill="#d97706">评价工具对接</text>
    <text x="100" y="42" text-anchor="middle" font-size="11" fill="#64748b">OSCE / mini-CEX</text>
    <text x="100" y="60" text-anchor="middle" font-size="11" fill="#64748b">DOPS / 概念图</text>
  </g>

  <g transform="translate(710, 435)">
    <rect x="0" y="0" width="200" height="80" rx="8" fill="#fce7f3" stroke="#fbcfe8"/>
    <text x="100" y="22" text-anchor="middle" font-size="12" font-weight="bold" fill="#be185d">医学人文融入</text>
    <text x="100" y="42" text-anchor="middle" font-size="11" fill="#64748b">医患沟通 / 伦理</text>
    <text x="100" y="60" text-anchor="middle" font-size="11" fill="#64748b">生命教育 / 职业素养</text>
  </g>
</svg>