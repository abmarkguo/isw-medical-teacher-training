<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/><stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>
    <linearGradient id="base-grad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#2563eb"/><stop offset="100%" stop-color="#1e40af"/></linearGradient>
    <linearGradient id="case-grad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ec4899"/><stop offset="100%" stop-color="#be185d"/></linearGradient>
    <linearGradient id="ppt-grad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#06b6d4"/><stop offset="100%" stop-color="#0e7490"/></linearGradient>
    <linearGradient id="qa-grad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#047857"/></linearGradient>
    <linearGradient id="interact-grad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#b45309"/></linearGradient>
    <linearGradient id="output-grad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#8b5cf6"/><stop offset="100%" stop-color="#6d28d9"/></linearGradient>
    <filter id="sh5" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="1000" height="560" fill="url(#bg5)"/>

  <!-- Title -->
  <text x="500" y="36" text-anchor="middle" font-size="22" font-weight="bold" fill="#1e293b">完整备课协同流程</text>
  <text x="500" y="58" text-anchor="middle" font-size="13" fill="#64748b">Complete Lesson Preparation Workflow — 五步生成完整教学准备包</text>

  <!-- Step 1: Lesson Plan (Base) -->
  <g filter="url(#sh5)">
    <rect x="50" y="100" width="200" height="130" rx="14" fill="url(#base-grad)"/>
    <text x="150" y="128" text-anchor="middle" font-size="20" fill="#fff" font-weight="bold">STEP 1</text>
    <text x="150" y="152" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">BOPPPS教案</text>
    <text x="150" y="170" text-anchor="middle" font-size="11" fill="#fff" opacity="0.9">Lesson Plan</text>
    <line x1="80" y1="180" x2="220" y2="180" stroke="#fff" stroke-opacity="0.3"/>
    <text x="150" y="200" text-anchor="middle" font-size="10" fill="#fff">六环节设计</text>
    <text x="150" y="216" text-anchor="middle" font-size="10" fill="#fff">三维目标 · 质量自检</text>
  </g>

  <!-- Arrow -->
  <polygon points="265,160 280,165 265,170" fill="#94a3b8"/>

  <!-- Step 2: Clinical Case -->
  <g filter="url(#sh5)">
    <rect x="290" y="100" width="200" height="130" rx="14" fill="url(#case-grad)"/>
    <text x="390" y="128" text-anchor="middle" font-size="20" fill="#fff" font-weight="bold">STEP 2</text>
    <text x="390" y="152" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">临床案例</text>
    <text x="390" y="170" text-anchor="middle" font-size="11" fill="#fff" opacity="0.9">Clinical Case</text>
    <line x1="320" y1="180" x2="460" y2="180" stroke="#fff" stroke-opacity="0.3"/>
    <text x="390" y="200" text-anchor="middle" font-size="10" fill="#fff">7阶段渐进信息</text>
    <text x="390" y="216" text-anchor="middle" font-size="10" fill="#fff">伦理讨论 · 跨学科链接</text>
  </g>

  <!-- Arrow -->
  <polygon points="505,160 520,165 505,170" fill="#94a3b8"/>

  <!-- Step 3: PPT -->
  <g filter="url(#sh5)">
    <rect x="530" y="100" width="200" height="130" rx="14" fill="url(#ppt-grad)"/>
    <text x="630" y="128" text-anchor="middle" font-size="20" fill="#fff" font-weight="bold">STEP 3</text>
    <text x="630" y="152" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">教学PPT</text>
    <text x="630" y="170" text-anchor="middle" font-size="11" fill="#fff" opacity="0.9">Teaching PPT</text>
    <line x1="560" y1="180" x2="700" y2="180" stroke="#fff" stroke-opacity="0.3"/>
    <text x="630" y="200" text-anchor="middle" font-size="10" fill="#fff">分页大纲 · 视觉规范</text>
    <text x="630" y="216" text-anchor="middle" font-size="10" fill="#fff">医学图片标注 · 教师备注</text>
  </g>

  <!-- Arrow -->
  <polygon points="745,160 760,165 745,170" fill="#94a3b8"/>

  <!-- Step 4: Progressive QA -->
  <g filter="url(#sh5)">
    <rect x="770" y="100" width="180" height="130" rx="14" fill="url(#qa-grad)"/>
    <text x="860" y="128" text-anchor="middle" font-size="20" fill="#fff" font-weight="bold">STEP 4</text>
    <text x="860" y="152" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">循序问答</text>
    <text x="860" y="170" text-anchor="middle" font-size="11" fill="#fff" opacity="0.9">Progressive QA</text>
    <line x1="800" y1="180" x2="920" y2="180" stroke="#fff" stroke-opacity="0.3"/>
    <text x="860" y="200" text-anchor="middle" font-size="10" fill="#fff">Bloom六层问题链</text>
    <text x="860" y="216" text-anchor="middle" font-size="10" fill="#fff">追问策略 · 互动方式</text>
  </g>

  <!-- Down arrows from Steps 3&4 to Step 5 -->
  <path d="M 630 240 Q 630 270 500 270 Q 370 270 390 270" stroke="#94a3b8" stroke-width="2" fill="none" stroke-dasharray="4 3"/>
  <path d="M 860 240 Q 860 270 500 270" stroke="#94a3b8" stroke-width="2" fill="none" stroke-dasharray="4 3"/>
  <path d="M 390 240 Q 390 270 500 270" stroke="#94a3b8" stroke-width="2" fill="none" stroke-dasharray="4 3"/>
  <path d="M 150 240 Q 150 270 500 270" stroke="#94a3b8" stroke-width="2" fill="none" stroke-dasharray="4 3"/>
  <polygon points="495,265 500,275 505,265" fill="#94a3b8"/>

  <!-- Step 5: Classroom Interaction -->
  <g filter="url(#sh5)">
    <rect x="300" y="290" width="400" height="100" rx="14" fill="url(#interact-grad)"/>
    <text x="500" y="318" text-anchor="middle" font-size="20" fill="#fff" font-weight="bold">STEP 5</text>
    <text x="500" y="342" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">课堂互动设计</text>
    <text x="500" y="360" text-anchor="middle" font-size="11" fill="#fff" opacity="0.9">Classroom Interaction Design</text>
    <text x="500" y="378" text-anchor="middle" font-size="10" fill="#fff">26种活动 · 全员参与保障 · 教师角色时间线 · 应急预案</text>
  </g>

  <!-- Down arrow to output -->
  <line x1="500" y1="400" x2="500" y2="430" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="495,425 500,435 505,425" fill="#94a3b8"/>

  <!-- Output: Complete Package -->
  <g filter="url(#sh5)">
    <rect x="100" y="445" width="800" height="95" rx="14" fill="url(#output-grad)"/>
    <text x="500" y="475" text-anchor="middle" font-size="16" fill="#fff" font-weight="bold">📦 完整教学准备包 Complete Teaching Package</text>
    <line x1="200" y1="488" x2="800" y2="488" stroke="#fff" stroke-opacity="0.3"/>
    <text x="200" y="510" text-anchor="middle" font-size="11" fill="#fff">教案</text>
    <text x="320" y="510" text-anchor="middle" font-size="11" fill="#fff">+ 案例</text>
    <text x="440" y="510" text-anchor="middle" font-size="11" fill="#fff">+ PPT</text>
    <text x="560" y="510" text-anchor="middle" font-size="11" fill="#fff">+ 问答</text>
    <text x="680" y="510" text-anchor="middle" font-size="11" fill="#fff">+ 互动</text>
    <text x="800" y="510" text-anchor="middle" font-size="11" fill="#fff">= 完整方案</text>
    <text x="500" y="530" text-anchor="middle" font-size="10" fill="#fff" opacity="0.8">一键生成 · 每步含质量自检 · 可独立使用或组合生成</text>
  </g>
</svg>