<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 640" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/><stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>
    <linearGradient id="step1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#1d4ed8"/></linearGradient>
    <linearGradient id="step2" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#8b5cf6"/><stop offset="100%" stop-color="#6d28d9"/></linearGradient>
    <linearGradient id="step3" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#06b6d4"/><stop offset="100%" stop-color="#0e7490"/></linearGradient>
    <linearGradient id="step4" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#b45309"/></linearGradient>
    <linearGradient id="step5" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#047857"/></linearGradient>
    <linearGradient id="cert-grad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#fbbf24"/><stop offset="100%" stop-color="#d97706"/></linearGradient>
    <filter id="sh4" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="1000" height="640" fill="url(#bg4)"/>

  <!-- Title -->
  <text x="500" y="36" text-anchor="middle" font-size="22" font-weight="bold" fill="#1e293b">教学能力评估与认证流程</text>
  <text x="500" y="58" text-anchor="middle" font-size="13" fill="#64748b">Teaching Competency Assessment &amp; Certification Flow</text>

  <!-- Step 1: Data Collection -->
  <g filter="url(#sh4)">
    <rect x="50" y="90" width="200" height="120" rx="12" fill="url(#step1)"/>
    <text x="150" y="118" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">① 数据收集</text>
    <text x="150" y="136" text-anchor="middle" font-size="11" fill="#fff" opacity="0.9">Data Collection</text>
    <line x1="80" y1="146" x2="220" y2="146" stroke="#fff" stroke-opacity="0.3"/>
    <text x="150" y="166" text-anchor="middle" font-size="10" fill="#fff">微格教学观察记录</text>
    <text x="150" y="182" text-anchor="middle" font-size="10" fill="#fff">BOPPPS教案文本</text>
    <text x="150" y="198" text-anchor="middle" font-size="10" fill="#fff">反思报告 · 同行反馈</text>
  </g>

  <!-- Arrow -->
  <polygon points="265,148 280,150 265,152" fill="#94a3b8"/>

  <!-- Step 2: Multi-dimensional Scoring -->
  <g filter="url(#sh4)">
    <rect x="290" y="80" width="210" height="140" rx="12" fill="url(#step2)"/>
    <text x="395" y="108" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">② 多维度评分</text>
    <text x="395" y="126" text-anchor="middle" font-size="11" fill="#fff" opacity="0.9">Multi-dim Scoring</text>
    <line x1="320" y1="136" x2="470" y2="136" stroke="#fff" stroke-opacity="0.3"/>
    <text x="395" y="156" text-anchor="middle" font-size="10" fill="#fff">微格教学 40%</text>
    <text x="395" y="172" text-anchor="middle" font-size="10" fill="#fff">教案质量 30%</text>
    <text x="395" y="188" text-anchor="middle" font-size="10" fill="#fff">反思报告 15%</text>
    <text x="395" y="204" text-anchor="middle" font-size="10" fill="#fff">同行反馈 15%</text>
  </g>

  <!-- Arrow -->
  <polygon points="515,148 530,150 515,152" fill="#94a3b8"/>

  <!-- Step 3: BOPPPS 7 Dimensions -->
  <g filter="url(#sh4)">
    <rect x="540" y="80" width="210" height="140" rx="12" fill="url(#step3)"/>
    <text x="645" y="108" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">③ BOPPPS七维评分</text>
    <text x="645" y="126" text-anchor="middle" font-size="11" fill="#fff" opacity="0.9">7-Dimension Rubric</text>
    <line x1="570" y1="136" x2="720" y2="136" stroke="#fff" stroke-opacity="0.3"/>
    <text x="645" y="154" text-anchor="middle" font-size="10" fill="#fff">B导入 · O目标 · P前测</text>
    <text x="645" y="170" text-anchor="middle" font-size="10" fill="#fff">P参与式 · P后测 · S总结</text>
    <text x="645" y="186" text-anchor="middle" font-size="10" fill="#fff">★ 医学特色维度</text>
    <text x="645" y="204" text-anchor="middle" font-size="9" fill="#fff" opacity="0.85">每项1-5分 · 含医学人文</text>
  </g>

  <!-- Arrow -->
  <polygon points="765,148 780,150 765,152" fill="#94a3b8"/>

  <!-- Step 4: Score Calculation -->
  <g filter="url(#sh4)">
    <rect x="790" y="90" width="180" height="120" rx="12" fill="url(#step4)"/>
    <text x="880" y="118" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">④ 综合评定</text>
    <text x="880" y="136" text-anchor="middle" font-size="11" fill="#fff" opacity="0.9">Score Calculation</text>
    <line x1="820" y1="146" x2="940" y2="146" stroke="#fff" stroke-opacity="0.3"/>
    <text x="880" y="166" text-anchor="middle" font-size="10" fill="#fff">加权计算总分</text>
    <text x="880" y="182" text-anchor="middle" font-size="10" fill="#fff">确定认证等级</text>
    <text x="880" y="198" text-anchor="middle" font-size="10" fill="#fff">生成证书编号</text>
  </g>

  <!-- Downward arrow to certification levels -->
  <line x1="880" y1="220" x2="880" y2="260" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4 3"/>
  <polygon points="875,255 880,265 885,255" fill="#94a3b8"/>

  <!-- Certification Levels -->
  <text x="500" y="262" text-anchor="middle" font-size="14" fill="#475569" font-weight="bold">认证等级 Certification Levels</text>

  <!-- 4 Certification Levels -->
  <g filter="url(#sh4)">
    <!-- Excellent -->
    <rect x="50" y="285" width="210" height="90" rx="12" fill="#fff" stroke="#10b981" stroke-width="2"/>
    <rect x="50" y="285" width="210" height="28" rx="12" fill="#10b981"/>
    <rect x="50" y="305" width="210" height="8" fill="#10b981"/>
    <text x="155" y="304" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">优秀认证 ≥ 90分</text>
    <text x="155" y="336" text-anchor="middle" font-size="11" fill="#059669" font-weight="bold">Excellent Certification</text>
    <text x="155" y="356" text-anchor="middle" font-size="10" fill="#64748b">推荐参加FDW培训</text>
    <text x="155" y="370" text-anchor="middle" font-size="10" fill="#64748b">可承担引导员角色</text>
  </g>

  <g filter="url(#sh4)">
    <!-- Pass -->
    <rect x="280" y="285" width="210" height="90" rx="12" fill="#fff" stroke="#3b82f6" stroke-width="2"/>
    <rect x="280" y="285" width="210" height="28" rx="12" fill="#3b82f6"/>
    <rect x="280" y="305" width="210" height="8" fill="#3b82f6"/>
    <text x="385" y="304" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">合格认证 75-89分</text>
    <text x="385" y="336" text-anchor="middle" font-size="11" fill="#2563eb" font-weight="bold">Pass Certification</text>
    <text x="385" y="356" text-anchor="middle" font-size="10" fill="#64748b">获得ISW结业认证</text>
    <text x="385" y="370" text-anchor="middle" font-size="10" fill="#64748b">颁发认证证书</text>
  </g>

  <g filter="url(#sh4)">
    <!-- Needs Improvement -->
    <rect x="510" y="285" width="210" height="90" rx="12" fill="#fff" stroke="#f59e0b" stroke-width="2"/>
    <rect x="510" y="285" width="210" height="28" rx="12" fill="#f59e0b"/>
    <rect x="510" y="305" width="210" height="8" fill="#f59e0b"/>
    <text x="615" y="304" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">待改进 60-74分</text>
    <text x="615" y="336" text-anchor="middle" font-size="11" fill="#d97706" font-weight="bold">Needs Improvement</text>
    <text x="615" y="356" text-anchor="middle" font-size="10" fill="#64748b">需补训后重新评估</text>
    <text x="615" y="370" text-anchor="middle" font-size="10" fill="#64748b">制定改进计划</text>
  </g>

  <g filter="url(#sh4)">
    <!-- Not Passed -->
    <rect x="740" y="285" width="210" height="90" rx="12" fill="#fff" stroke="#ef4444" stroke-width="2"/>
    <rect x="740" y="285" width="210" height="28" rx="12" fill="#ef4444"/>
    <rect x="740" y="305" width="210" height="8" fill="#ef4444"/>
    <text x="845" y="304" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">未通过 &lt; 60分</text>
    <text x="845" y="336" text-anchor="middle" font-size="11" fill="#dc2626" font-weight="bold">Not Passed</text>
    <text x="845" y="356" text-anchor="middle" font-size="10" fill="#64748b">需重新参加工作坊</text>
    <text x="845" y="370" text-anchor="middle" font-size="10" fill="#64748b">下一期再评估</text>
  </g>

  <!-- Down arrow to Report -->
  <line x1="500" y1="395" x2="500" y2="430" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4 3"/>
  <polygon points="495,425 500,435 505,425" fill="#94a3b8"/>

  <!-- Certification Report -->
  <g filter="url(#sh4)">
    <rect x="200" y="445" width="600" height="65" rx="12" fill="url(#cert-grad)"/>
    <text x="500" y="473" text-anchor="middle" font-size="15" fill="#fff" font-weight="bold">⑤ 认证报告生成 Certification Report</text>
    <text x="500" y="495" text-anchor="middle" font-size="11" fill="#fff" opacity="0.9">总分 · 等级 · 分项得分 · 优势分析 · 改进建议 · 同行反馈 · 发展路径 · 证书编号 ISW-MED-年份-批次-序号</text>
  </g>

  <!-- Down arrow -->
  <line x1="500" y1="525" x2="500" y2="555" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4 3"/>
  <polygon points="495,550 500,560 505,550" fill="#94a3b8"/>

  <!-- Development Path -->
  <g filter="url(#sh4)">
    <rect x="150" y="570" width="700" height="55" rx="12" fill="#fff" stroke="#e2e8f0"/>
    <text x="500" y="594" text-anchor="middle" font-size="14" fill="#2563eb" font-weight="bold">⑥ 发展路径建议 Development Pathway</text>
    <text x="500" y="614" text-anchor="middle" font-size="11" fill="#64748b">薄弱环节诊断 → 个性化发展建议 → 推荐资源 → 制定IDP个人教学发展计划</text>
  </g>
</svg>